<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H72 Weight Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #eeede8;
    --bg-info: #e6f1fb; --bg-success: #eaf3de; --bg-warning: #faeeda; --bg-danger: #fcebeb;
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-tertiary: #888780;
    --text-info: #185fa5; --text-success: #3b6d11; --text-warning: #854f0b; --text-danger: #a32d2d;
    --border-t: rgba(0,0,0,0.1); --border-s: rgba(0,0,0,0.18); --border-p: rgba(0,0,0,0.3);
    --radius-md: 8px; --radius-lg: 12px;
    --bar-ok: #639922; --bar-over: #E24B4A;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
      --bg-info: #0c447c; --bg-success: #27500a; --bg-warning: #633806; --bg-danger: #791f1f;
      --text-primary: #f0ede6; --text-secondary: #b4b2a9; --text-tertiary: #888780;
      --text-info: #85b7eb; --text-success: #97c459; --text-warning: #ef9f27; --text-danger: #f09595;
      --border-t: rgba(255,255,255,0.1); --border-s: rgba(255,255,255,0.18); --border-p: rgba(255,255,255,0.3);
    }
  }
  html { font-size: 16px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 1.5rem 1rem; }
  .container { max-width: 740px; margin: 0 auto; }
  button { cursor: pointer; font-family: inherit; }

  /* ── Auth ── */
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .auth-card { background: var(--bg-primary); border: 0.5px solid var(--border-t); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 380px; }
  .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; }
  .auth-logo img { width: 56px; height: 56px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(167,139,250,0.35)); }
  .auth-logo-name { font-size: 26px; font-weight: 800; background: linear-gradient(90deg,#60c8f5,#a78bfa,#f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
  .auth-logo-sub { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.12em; margin-top: 3px; font-weight: 500; }
  .auth-tabs { display: flex; border: 0.5px solid var(--border-t); border-radius: var(--radius-md); overflow: hidden; margin-bottom: 1.25rem; }
  .auth-tab { flex: 1; padding: 8px; font-size: 13px; font-weight: 500; background: transparent; border: none; color: var(--text-secondary); }
  .auth-tab.active { background: var(--bg-secondary); color: var(--text-primary); }
  .auth-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .auth-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .auth-inp { height: 38px; padding: 0 12px; font-size: 14px; border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); outline: none; width: 100%; font-family: inherit; }
  .auth-inp:focus { border-color: var(--border-p); background: var(--bg-primary); }
  .auth-btn { width: 100%; height: 40px; border: none; border-radius: var(--radius-md); background: linear-gradient(90deg,#60c8f5,#a78bfa); color: #fff; font-size: 14px; font-weight: 600; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .auth-btn:hover { opacity: 0.9; } .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-error { font-size: 12px; color: var(--text-danger); background: var(--bg-danger); border-radius: var(--radius-md); padding: 8px 12px; margin-bottom: 10px; display: none; }
  .auth-error.show { display: block; }

  /* ── Loading ── */
  .loading-wrap { min-height: 60vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border-t); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-tertiary); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #639922; display: inline-block; margin-left: 6px; vertical-align: middle; }
  .sync-dot.syncing { background: #ef9f27; animation: pulse 1s ease-in-out infinite; }
  .sync-dot.error { background: #E24B4A; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Header ── */
  .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; gap: 16px; flex-wrap: wrap; }
  .app-logo { display: flex; align-items: center; gap: 14px; }
  .app-logo img { width: 72px; height: 72px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(167,139,250,0.35)); }
  .app-logo-text { display: flex; flex-direction: column; }
  .app-logo-name { font-size: 30px; font-weight: 800; background: linear-gradient(90deg,#60c8f5,#a78bfa,#f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; letter-spacing: -0.5px; }
  .app-logo-sub { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.12em; margin-top: 3px; font-weight: 500; }
  .top-btns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .icon-btn { border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: transparent; color: var(--text-secondary); padding: 7px 13px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
  .icon-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .icon-btn.active { background: var(--bg-secondary); color: var(--text-primary); border-color: var(--border-p); }
  .signout-btn { border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: transparent; color: var(--text-tertiary); padding: 7px 11px; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; }
  .signout-btn:hover { background: var(--bg-danger); color: var(--text-danger); border-color: var(--text-danger); }

  /* ── Panels ── */
  .panel { background: var(--bg-primary); border: 0.5px solid var(--border-t); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 480px) { .settings-grid { grid-template-columns: 1fr; } }
  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .field-inp { height: 36px; padding: 0 10px; font-size: 13px; border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); outline: none; width: 100%; font-family: inherit; }
  .field-inp:focus { border-color: var(--border-p); background: var(--bg-primary); }
  .save-btn { border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: transparent; color: var(--text-primary); padding: 7px 16px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
  .save-btn:hover { background: var(--bg-secondary); }

  /* ── Dashboard ── */
  .dash-section-title { font-size: 11px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.07em; margin-bottom: 8px; text-transform: uppercase; }
  .stat-grid-2 { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; margin-bottom: 10px; }
  .stat-grid-3 { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; margin-bottom: 10px; }
  .stat-grid-1 { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 500px) { .stat-grid-3 { grid-template-columns: repeat(2,minmax(0,1fr)); } }
  .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: .75rem 1rem; }
  .stat-card-lbl { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
  .stat-card-val { font-size: 20px; font-weight: 500; color: var(--text-primary); line-height: 1.1; }
  .stat-card-unit { font-size: 11px; color: var(--text-secondary); margin-left: 3px; font-weight: 400; }
  .stat-card-sub { font-size: 11px; margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .delta-pill { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .pill-loss { background: var(--bg-success); color: var(--text-success); }
  .pill-gain { background: var(--bg-danger); color: var(--text-danger); }
  .pill-more { background: var(--bg-success); color: var(--text-success); }
  .pill-less { background: var(--bg-danger); color: var(--text-danger); }
  .pill-none { background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-t); }
  .chart-wrap { position: relative; width: 100%; height: 200px; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  @media (max-width: 540px) { .charts-row { grid-template-columns: 1fr; } }
  .chart-block-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
  .divider { height: 0.5px; background: var(--border-t); margin: 16px 0; }
  .periods-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; margin-top: 10px; }
  @media (max-width: 480px) { .periods-grid { grid-template-columns: 1fr; } }
  .period-stat { background: var(--bg-secondary); border-radius: var(--radius-md); padding: .625rem .875rem; }
  .period-stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
  .period-stat-badge { font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 500; }
  .empty-dash { font-size: 13px; color: var(--text-tertiary); text-align: center; padding: 1.5rem 0; }

  /* ── Guide panel ── */
  .guide-section { margin-bottom: 18px; }
  .guide-section:last-child { margin-bottom: 0; }
  .guide-section-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: flex; align-items: center; gap: 7px; padding-bottom: 7px; border-bottom: 0.5px solid var(--border-t); }
  .guide-steps { display: flex; flex-direction: column; gap: 8px; }
  .guide-step { display: flex; gap: 10px; align-items: flex-start; }
  .guide-step-num { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg,#60c8f5,#a78bfa); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .guide-step-body { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
  .guide-step-body strong { color: var(--text-primary); font-weight: 500; }
  .guide-tip { background: var(--bg-info); border-radius: var(--radius-md); padding: 8px 12px; font-size: 12px; color: var(--text-info); display: flex; gap: 7px; align-items: flex-start; margin-top: 10px; }
  .guide-legend { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
  .guide-legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
  .legend-swatch { width: 28px; height: 8px; border-radius: 4px; flex-shrink: 0; }
  .legend-pill-demo { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }

  /* ── Period cards ── */
  .period-card { background: var(--bg-primary); border: 0.5px solid var(--border-t); border-radius: var(--radius-lg); margin-bottom: 1.25rem; overflow: hidden; }
  .period-header { padding: .875rem 1.25rem; border-bottom: 0.5px solid var(--border-t); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .period-title { font-size: 14px; font-weight: 500; color: var(--text-primary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .period-goals-grid { display: grid; grid-template-columns: auto auto; gap: 8px 16px; align-items: center; }
  .period-goals-grid .goal-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .period-goals-grid .goal-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .goal-select, .goal-input { font-size: 13px; padding: 4px 8px; height: 30px; border-radius: var(--radius-md); border: 0.5px solid var(--border-s); background: var(--bg-secondary); color: var(--text-primary); outline: none; font-family: inherit; }
  .goal-input { width: 90px; }
  .goal-select:focus, .goal-input:focus { border-color: var(--border-p); background: var(--bg-primary); }
  .goal-badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  .badge-deficit  { background: var(--bg-warning); color: var(--text-warning); }
  .badge-maintain { background: var(--bg-info);    color: var(--text-info); }
  .badge-surplus  { background: var(--bg-success); color: var(--text-success); }
  .week-section { border-bottom: 0.5px solid var(--border-t); }
  .week-section:last-of-type { border-bottom: none; }
  .week-header { display: flex; align-items: center; justify-content: space-between; padding: .625rem 1.25rem; cursor: pointer; user-select: none; background: var(--bg-secondary); }
  .week-title { font-size: 12px; font-weight: 500; color: var(--text-primary); }
  .week-mini-stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .mini-stat { font-size: 11px; color: var(--text-secondary); }
  .mini-stat b { font-weight: 500; color: var(--text-primary); }
  .weight-delta { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
  .delta-loss { background: var(--bg-success); color: var(--text-success); }
  .delta-gain { background: var(--bg-danger);  color: var(--text-danger); }
  .week-body { padding: .5rem 1.25rem .625rem; }
  .col-headers { display: grid; grid-template-columns: 50px 1fr 1fr 1fr 60px 24px; gap: 7px; padding: 5px 0 3px; border-bottom: 0.5px solid var(--border-t); }
  .col-hdr { font-size: 10px; color: var(--text-tertiary); letter-spacing: .04em; }
  .day-row { display: grid; grid-template-columns: 50px 1fr 1fr 1fr 60px 24px; gap: 7px; align-items: center; padding: 4px 0; border-bottom: 0.5px solid var(--border-t); }
  .day-row:last-child { border-bottom: none; }
  .day-lbl { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .day-inp { width: 100%; height: 28px; padding: 0 6px; font-size: 12px; border: 0.5px solid var(--border-t); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); outline: none; font-family: inherit; }
  .day-inp:focus { border-color: var(--border-p); background: var(--bg-primary); }
  .day-inp::placeholder { color: var(--text-tertiary); }
  .bar-wrap { height: 4px; border-radius: 2px; background: var(--border-t); overflow: hidden; margin-top: 3px; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .bar-ok   { background: #639922; }
  .bar-over { background: #E24B4A; }
  .clr-btn { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: 0.5px solid var(--border-t); border-radius: var(--radius-md); background: transparent; color: var(--text-tertiary); font-size: 11px; }
  .clr-btn:hover { border-color: var(--border-s); color: var(--text-secondary); }
  .week-summary { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 8px; padding: .75rem 1.25rem; background: var(--bg-secondary); border-top: 0.5px solid var(--border-t); }
  @media (max-width: 540px) { .week-summary { grid-template-columns: repeat(2,minmax(0,1fr)); } }
  .sum-card { background: var(--bg-primary); border-radius: var(--radius-md); padding: .5rem .75rem; }
  .sum-lbl { font-size: 10px; color: var(--text-secondary); margin-bottom: 2px; }
  .sum-val { font-size: 15px; font-weight: 500; color: var(--text-primary); }
  .sum-unit { font-size: 10px; color: var(--text-secondary); margin-left: 2px; }
  .sum-sub { font-size: 10px; margin-top: 2px; }
  .collapsed .week-body, .collapsed .week-summary { display: none; }
  .chevron { transition: transform .2s; font-size: 13px; color: var(--text-tertiary); }
  .collapsed .chevron { transform: rotate(-90deg); }
  .add-btn { border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: transparent; color: var(--text-secondary); padding: 6px 14px; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; }
  .add-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

  @media (max-width: 560px) {
    body { padding: 1rem .625rem; }
    .app-logo img { width: 52px; height: 52px; }
    .app-logo-name { font-size: 22px; }
    .col-headers, .day-row { grid-template-columns: 44px 1fr 1fr 1fr 24px; }
    .col-hdr:nth-child(5), .vs-goal-cell { display: none; }
    .period-header { flex-direction: column; align-items: flex-start; }
    .period-goals-grid { grid-template-columns: 1fr; }
  }

  /* ── Training module ── */
  .training-tabs { display: flex; gap: 6px; margin-bottom: 1rem; border-bottom: 0.5px solid var(--border-t); padding-bottom: 10px; flex-wrap: wrap; }
  .training-tab { border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: transparent; color: var(--text-secondary); padding: 6px 14px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; cursor: pointer; }
  .training-tab:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .training-tab.active { background: var(--bg-secondary); color: var(--text-primary); border-color: var(--border-p); }
  .tr-section-title { font-size: 11px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.07em; margin-bottom: 8px; text-transform: uppercase; }
  .tr-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .tr-search-inp { flex: 1; height: 36px; padding: 0 10px; font-size: 13px; border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); outline: none; font-family: inherit; }
  .tr-search-inp:focus { border-color: var(--border-p); background: var(--bg-primary); }
  .tr-btn { border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: transparent; color: var(--text-secondary); padding: 0 14px; height: 36px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; cursor: pointer; white-space: nowrap; }
  .tr-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .tr-btn-primary { background: linear-gradient(90deg,#60c8f5,#a78bfa); color: #fff; border-color: transparent; }
  .tr-btn-primary:hover { opacity: 0.9; }
  .tr-btn-sm { height: 28px; padding: 0 10px; font-size: 11px; }
  .tr-btn-danger { border-color: var(--text-danger); color: var(--text-danger); }
  .tr-btn-danger:hover { background: var(--bg-danger); }
  .exercise-list { display: flex; flex-direction: column; gap: 6px; max-height: 340px; overflow-y: auto; margin-bottom: 12px; }
  .exercise-item { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .exercise-item-info { flex: 1; min-width: 0; }
  .exercise-item-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .exercise-item-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
  .exercise-badge { font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 500; background: var(--bg-info); color: var(--text-info); display: inline-block; }
  .exercise-badge.custom { background: var(--bg-success); color: var(--text-success); }
  .tr-empty { font-size: 13px; color: var(--text-tertiary); text-align: center; padding: 1.5rem 0; }
  .tr-divider { height: 0.5px; background: var(--border-t); margin: 14px 0; }
  .routine-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .routine-card { background: var(--bg-secondary); border-radius: var(--radius-md); overflow: hidden; }
  .routine-header { padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; user-select: none; }
  .routine-title { font-size: 13px; font-weight: 500; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
  .routine-body { padding: 8px 12px 10px; border-top: 0.5px solid var(--border-t); display: flex; flex-direction: column; gap: 6px; }
  .routine-ex-row { display: grid; grid-template-columns: 1fr 60px 60px 70px 28px; gap: 6px; align-items: center; }
  .routine-ex-name { font-size: 12px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .routine-ex-inp { height: 26px; padding: 0 6px; font-size: 12px; border: 0.5px solid var(--border-t); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); outline: none; width: 100%; font-family: inherit; text-align: center; }
  .routine-ex-inp:focus { border-color: var(--border-p); }
  .routine-col-hdr { font-size: 10px; color: var(--text-tertiary); letter-spacing: .04em; text-align: center; }
  .session-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
  .session-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; }
  .session-date { font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px; }
  .session-routine-name { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .session-ex-rows { display: flex; flex-direction: column; gap: 3px; }
  .session-ex-row { font-size: 12px; color: var(--text-secondary); display: flex; justify-content: space-between; gap: 8px; }
  .session-note { font-size: 11px; color: var(--text-tertiary); font-style: italic; margin-top: 6px; border-top: 0.5px solid var(--border-t); padding-top: 6px; }
  .session-log-form { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; margin-bottom: 12px; }
  .session-log-ex { display: grid; grid-template-columns: 1fr 60px 60px 70px; gap: 6px; align-items: center; margin-bottom: 5px; }
  .tr-textarea { width: 100%; padding: 7px 10px; font-size: 13px; border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); outline: none; font-family: inherit; resize: vertical; min-height: 56px; }
  .tr-textarea:focus { border-color: var(--border-p); }
  .tr-select { height: 36px; padding: 0 10px; font-size: 13px; border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); outline: none; font-family: inherit; width: 100%; margin-bottom: 10px; }
  .tr-select:focus { border-color: var(--border-p); background: var(--bg-primary); }
  .prog-table { width: 100%; font-size: 12px; border-collapse: collapse; }
  .prog-table th { font-size: 10px; color: var(--text-tertiary); font-weight: 500; text-align: left; padding: 3px 6px; border-bottom: 0.5px solid var(--border-t); }
  .prog-table td { padding: 4px 6px; border-bottom: 0.5px solid var(--border-t); color: var(--text-secondary); }
  .prog-table tr:last-child td { border-bottom: none; }
  .prog-table td:first-child { color: var(--text-primary); font-weight: 500; }
  .tr-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .tr-modal { background: var(--bg-primary); border: 0.5px solid var(--border-s); border-radius: var(--radius-lg); padding: 1.25rem; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
  .tr-modal-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 7px; }
  .tr-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .tr-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .tr-inp { height: 36px; padding: 0 10px; font-size: 13px; border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); outline: none; width: 100%; font-family: inherit; }
  .tr-inp:focus { border-color: var(--border-p); background: var(--bg-primary); }
  .tr-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .loading-inline { font-size: 12px; color: var(--text-tertiary); display: flex; align-items: center; gap: 6px; padding: 6px 0; }
  .spinner-sm { width: 14px; height: 14px; border: 2px solid var(--border-t); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @media (max-width: 480px) {
    .routine-ex-row { grid-template-columns: 1fr 50px 50px 60px 24px; }
    .session-log-ex { grid-template-columns: 1fr 50px 50px 60px; }
  }
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCWcAvQAm1i5lRztY6ReFlF95rTxl3Ta5U",
  authDomain: "h72-tracker.firebaseapp.com",
  projectId: "h72-tracker",
  storageBucket: "h72-tracker.firebasestorage.app",
  messagingSenderId: "854043592556",
  appId: "1:854043592556:web:8e4325a3c6c628e5d89549",
  measurementId: "G-N5RNH8M1L0"
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

window._auth    = auth;
window._signOut = () => signOut(auth);
window._docRef  = (uid) => doc(db, 'users', uid, 'data', 'tracker');

window._saveToFirebase = async function(data) {
  if (!auth.currentUser) return;
  setSyncState('syncing');
  try { await setDoc(window._docRef(auth.currentUser.uid), { payload: JSON.stringify(data) }); setSyncState('ok'); }
  catch(e) { console.error(e); setSyncState('error'); }
};
window._loadFromFirebase = async function(uid) {
  try { const s = await getDoc(window._docRef(uid)); if (s.exists()) return JSON.parse(s.data().payload); }
  catch(e) { console.error(e); }
  return null;
};
window.submitAuth = async function() {
  const email=document.getElementById('auth-email').value.trim(), password=document.getElementById('auth-password').value, confirm=document.getElementById('auth-confirm').value;
  const isSignup=window._authMode==='signup';
  document.getElementById('auth-error').className='auth-error';
  if(!email||!password){showAuthError('Please fill in all fields.');return;}
  if(isSignup&&password!==confirm){showAuthError('Passwords do not match.');return;}
  if(password.length<6){showAuthError('Password must be at least 6 characters.');return;}
  document.getElementById('auth-submit').disabled=true;
  try { if(isSignup) await createUserWithEmailAndPassword(auth,email,password); else await signInWithEmailAndPassword(auth,email,password); }
  catch(e) {
    document.getElementById('auth-submit').disabled=false;
    const msgs={'auth/user-not-found':'No account found with that email.','auth/wrong-password':'Incorrect password.','auth/email-already-in-use':'An account with that email already exists.','auth/invalid-email':'Please enter a valid email address.','auth/invalid-credential':'Incorrect email or password.'};
    showAuthError(msgs[e.code]||'Something went wrong. Please try again.');
  }
};
function showAuthError(msg){const el=document.getElementById('auth-error');el.textContent=msg;el.className='auth-error show';}
window._authMode='login';
window.switchTab=function(mode){
  window._authMode=mode;
  document.getElementById('tab-login').className='auth-tab'+(mode==='login'?' active':'');
  document.getElementById('tab-signup').className='auth-tab'+(mode==='signup'?' active':'');
  document.getElementById('confirm-field').style.display=mode==='signup'?'flex':'none';
  document.getElementById('auth-btn-label').textContent=mode==='signup'?'Create account':'Sign in';
  document.getElementById('auth-error').className='auth-error';
};
onAuthStateChanged(auth, async (user) => {
  if(user){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('loading-screen').style.display='flex';
    document.getElementById('main-app').style.display='none';
    const remote=await window._loadFromFirebase(user.uid);
    if(remote){window._appData=remote;}
    else{const t=new Date(),dow=(t.getDay()+6)%7,m=new Date(t);m.setDate(t.getDate()-dow);window._appData={name:'',startDate:m.toISOString().slice(0,10),showSettings:true,showDash:false,showGuide:false,showTrain:false,periods:[makePeriod()]};}
    window._appData.periods.forEach(function(p){if(!p.stepGoal)p.stepGoal=8000;});
    if(window._appData.showGuide===undefined)window._appData.showGuide=false;
    if(window._appData.showTrain===undefined)window._appData.showTrain=false;
    if(!window._appData.training)window._appData.training={exercises:[],routines:[],sessions:[]};
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    render();
  } else {
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('main-app').style.display='none';
  }
});
</script>

<script>
function setSyncState(s){var d=document.getElementById('sync-dot');if(!d)return;d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');d.title=s==='syncing'?'Saving\u2026':s==='error'?'Save failed':'Saved';}

var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var chartWeightInst=null,chartStepsInst=null;
var saveTimer=null;
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(function(){if(window._saveToFirebase&&window._appData)window._saveToFirebase(window._appData);},1200);}

function addDays(s,n){var d=new Date(s);d.setDate(d.getDate()+n);return d}
function fmtDate(d){return d.toLocaleDateString('en-SE',{day:'numeric',month:'short'})}
function weekLabel(s,twi){return fmtDate(addDays(s,twi*7))+' \u2013 '+fmtDate(addDays(s,twi*7+6))}
function periodLabel(s,pi){return fmtDate(addDays(s,pi*28))+' \u2013 '+fmtDate(addDays(s,pi*28+27))}
function makeWeek(){return{collapsed:true,days:DAYS.map(function(d){return{day:d,weight:'',calories:'',steps:''}})}}
function makePeriod(){return{goal:'maintain',calGoal:2000,stepGoal:8000,weeks:[makeWeek(),makeWeek(),makeWeek(),makeWeek()]}}

function weekStats(week){
  var wts=week.days.map(function(d){return parseFloat(d.weight)}).filter(function(v){return !isNaN(v)&&v>0});
  var cals=week.days.map(function(d){return parseInt(d.calories)}).filter(function(v){return !isNaN(v)&&v>0});
  var stps=week.days.map(function(d){return parseInt(d.steps)}).filter(function(v){return !isNaN(v)&&v>0});
  return{avgWeight:wts.length?(wts.reduce(function(a,b){return a+b},0)/wts.length):null,totalCal:cals.length?cals.reduce(function(a,b){return a+b},0):null,loggedDays:cals.length,avgSteps:stps.length?Math.round(stps.reduce(function(a,b){return a+b},0)/stps.length):null};
}

function getAllWeeksFlat(){
  var all=[];
  window._appData.periods.forEach(function(p,pi){p.weeks.forEach(function(w,wi){all.push({week:w,period:p,pi:pi,wi:wi,stats:weekStats(w)});});});
  return all;
}

function getCurrentAndLastWeekIndices(){
  var today=new Date();today.setHours(0,0,0,0);
  var startDate=new Date(window._appData.startDate);startDate.setHours(0,0,0,0);
  var allWeeks=getAllWeeksFlat();
  var currentIdx=allWeeks.length>0?allWeeks.length-1:0;
  for(var i=0;i<allWeeks.length;i++){
    var wMon=new Date(startDate);wMon.setDate(startDate.getDate()+(allWeeks[i].pi*4+allWeeks[i].wi)*7);wMon.setHours(0,0,0,0);
    var wSun=new Date(wMon);wSun.setDate(wMon.getDate()+6);wSun.setHours(23,59,59,999);
    if(today>=wMon&&today<=wSun){currentIdx=i;break;}
  }
  var lastFullIdx=-1;
  for(var j=currentIdx-1;j>=0;j--){if(allWeeks[j].stats.avgWeight!==null||allWeeks[j].stats.avgSteps!==null){lastFullIdx=j;break;}}
  if(lastFullIdx===-1&&currentIdx>0)lastFullIdx=currentIdx-1;
  var prevToLastIdx=-1;
  if(lastFullIdx>0){for(var k=lastFullIdx-1;k>=0;k--){if(allWeeks[k].stats.avgSteps!==null){prevToLastIdx=k;break;}}}
  return{currentIdx:currentIdx,lastFullIdx:lastFullIdx,prevToLastIdx:prevToLastIdx,allWeeks:allWeeks};
}

function getStartingWeight(){var all=getAllWeeksFlat();for(var i=0;i<all.length;i++){if(all[i].stats.avgWeight!==null)return all[i].stats.avgWeight;}return null;}
function getPeriodStartWeight(pi){var p=window._appData.periods[pi];if(!p)return null;for(var j=0;j<p.weeks.length;j++){var s=weekStats(p.weeks[j]);if(s.avgWeight!==null)return s.avgWeight;}return null;}
function getPeriodEndWeight(pi){var p=window._appData.periods[pi];if(!p)return null;var last=null;p.weeks.forEach(function(w){var s=weekStats(w);if(s.avgWeight!==null)last=s.avgWeight;});return last;}
function isPeriodCompleted(pi){var p=window._appData.periods[pi];if(!p)return false;return p.weeks.filter(function(w){return weekStats(w).avgWeight!==null}).length>=2;}

function weightDeltaPill(diff){
  if(diff===null||isNaN(diff))return '<span class="delta-pill pill-none">\u2014</span>';
  var sign=diff>0?'+':'',cls=diff<0?'pill-loss':diff>0?'pill-gain':'pill-none',icon=diff<0?'ti-trending-down':diff>0?'ti-trending-up':'ti-minus';
  return '<span class="delta-pill '+cls+'"><i class="ti '+icon+'" style="font-size:11px"></i>'+sign+diff.toFixed(1)+' kg</span>';
}
function stepsDeltaPill(cur,prev){
  if(cur===null||prev===null)return '';
  var diff=cur-prev,sign=diff>=0?'+':'',pct=prev>0?Math.round((diff/prev)*100):0,cls=diff>=0?'pill-more':'pill-less',icon=diff>=0?'ti-trending-up':'ti-trending-down';
  return '<span class="delta-pill '+cls+'"><i class="ti '+icon+'" style="font-size:11px"></i>'+sign+diff.toLocaleString()+' steps ('+sign+pct+'%)</span>';
}
function stepsVsGoalStr(avg,goal){
  if(avg===null||!goal)return '';
  var diff=avg-goal,sign=diff>=0?'+':'',color=diff>=0?'var(--text-success)':'var(--text-danger)';
  return '<span style="color:'+color+';font-size:10px">'+sign+diff.toLocaleString()+' vs goal</span>';
}

// Get current period's step goal for chart coloring
function getStepGoalForWeekIndex(allWeeks, idx) {
  if(idx<0||idx>=allWeeks.length)return 8000;
  return allWeeks[idx].period.stepGoal||8000;
}

function buildCharts(){
  if(chartWeightInst){chartWeightInst.destroy();chartWeightInst=null;}
  if(chartStepsInst){chartStepsInst.destroy();chartStepsInst=null;}
  var wCanvas=document.getElementById('dash-chart-weight');
  var sCanvas=document.getElementById('dash-chart-steps');
  var labels=[],weights=[],steps=[],stepColors=[],stepBorderColors=[];
  window._appData.periods.forEach(function(p,pi){
    p.weeks.forEach(function(w,wi){
      labels.push(fmtDate(addDays(window._appData.startDate,(pi*4+wi)*7)));
      var s=weekStats(w);
      weights.push(s.avgWeight!==null?parseFloat(s.avgWeight.toFixed(1)):null);
      var avg=s.avgSteps!==null?s.avgSteps:null;
      steps.push(avg);
      var goal=p.stepGoal||8000;
      var metGoal=avg!==null&&avg>=goal;
      // green if met/exceeded goal, red if below goal, grey if no data
      stepColors.push(avg===null?'rgba(180,180,180,0.3)':metGoal?'rgba(99,153,34,0.75)':'rgba(226,75,74,0.75)');
      stepBorderColors.push(avg===null?'rgba(180,180,180,0.5)':metGoal?'#639922':'#E24B4A');
    });
  });
  var isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  var gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  var tc=isDark?'rgba(255,255,255,0.38)':'rgba(0,0,0,0.35)';
  if(wCanvas){chartWeightInst=new Chart(wCanvas,{type:'line',data:{labels:labels,datasets:[{data:weights,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.08)',pointBackgroundColor:'#185FA5',pointRadius:4,pointHoverRadius:6,borderWidth:2,tension:0.35,fill:true,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y!==null?c.parsed.y.toFixed(1)+' kg':'No data'}}}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:10},maxRotation:40,autoSkip:true,maxTicksLimit:10}},y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:function(v){return v+' kg'}},grace:'5%'}}}});}
  if(sCanvas){chartStepsInst=new Chart(sCanvas,{type:'bar',data:{labels:labels,datasets:[{data:steps,backgroundColor:stepColors,borderColor:stepBorderColors,borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y!==null?c.parsed.y.toLocaleString()+' steps/day':'No data'}}}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:10},maxRotation:40,autoSkip:true,maxTicksLimit:10}},y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:function(v){return v>=1000?(v/1000).toFixed(0)+'k':v}},grace:'5%'}}}});}
}

    '</div>';

  var chartsHtml='<div class="divider"></div><div class="dash-section-title">TRENDS</div><div class="charts-row">'+

    var bc={deficit:'badge-deficit',maintain:'badge-maintain',surplus:'badge-surplus'}[period.goal]||'badge-maintain';

    period.weeks.forEach(function(week,wi){

      if(stats.avgWeight!==null&&prevStats&&prevStats.avgWeight){var diff=stats.avgWeight-prevStats.avgWeight;dHtml='<span class="weight-delta '+(diff<0?'delta-loss':'delta-gain')+'">'+(diff>0?'+':'')+diff.toFixed(1)+' kg</span>';}

      if(stats.avgSteps!==null&&prevStats&&prevStats.avgSteps){var sd=stats.avgSteps-prevStats.avgSteps,spct=prevStats.avgSteps>0?Math.round((sd/prevStats.avgSteps)*100):0,ssign=sd>=0?'+':'';stepsD='<span class="weight-delta '+(sd>=0?'delta-loss':'delta-gain')+'">'+ssign+sd.toLocaleString()+' ('+ssign+spct+'%)</span>';}

        var calDiff=cal&&goalCal?cal-goalCal:null,diffStr=calDiff!==null?(calDiff>=0?'+'+calDiff.toLocaleString():calDiff.toLocaleString()):'-';

      sec.innerHTML='<div class="week-header" data-pi="'+pi+'" data-wi="'+wi+'"><span class="week-title">'+wLabel+'</span>'+
        '<div class="week-mini-stats">'+dHtml+stepsD+
        '<span class="mini-stat"><i class="ti ti-scale" style="font-size:12px;margin-right:2px;vertical-align:-1px"></i><b>'+avgW+'</b>'+(stats.avgWeight!==null?' kg':'')+'</span>'+
        '<span class="mini-stat"><i class="ti ti-flame" style="font-size:12px;margin-right:2px;vertical-align:-1px"></i><b>'+totalC+'</b>'+(stats.totalCal!==null?' kcal':'')+'</span>'+
        '<span class="mini-stat"><i class="ti ti-shoe" style="font-size:12px;margin-right:2px;vertical-align:-1px"></i><b>'+avgSt+'</b>'+(stats.avgSteps!==null?'/d':'')+'</span>'+
        '<i class="ti ti-chevron-down chevron"></i></div></div>'+
        '<div class="week-body"><div class="col-headers"><div class="col-hdr">Day</div><div class="col-hdr">Weight</div><div class="col-hdr">Calories</div><div class="col-hdr">Steps</div><div class="col-hdr vs-goal-cell">Cal \u0394</div><div></div></div>'+
        dayRows+'</div>'+
        '<div class="week-summary">'+
        '<div class="sum-card"><div class="sum-lbl"><i class="ti ti-scale" style="font-size:11px;margin-right:2px;vertical-align:-1px"></i>Avg weight</div><div class="sum-val">'+avgW+'<span class="sum-unit">'+(stats.avgWeight!==null?'kg':'')+'</span></div><div class="sum-sub">'+(dHtml||'<span style="color:var(--text-tertiary)">\u2014</span>')+'</div></div>'+

        '<div class="sum-card"><div class="sum-lbl"><i class="ti ti-shoe" style="font-size:11px;margin-right:2px;vertical-align:-1px"></i>Avg steps/day</div><div class="sum-val">'+avgSt+'</div><div class="sum-sub">'+(stepsVsGoalStr(stats.avgSteps,stepGoal)||'<span style="color:var(--text-tertiary)">\u2014</span>')+'</div></div>'+
        '<div class="sum-card"><div class="sum-lbl"><i class="ti ti-target" style="font-size:11px;margin-right:2px;vertical-align:-1px"></i>Goals</div><div class="sum-val" style="font-size:12px;margin-top:2px"><i class="ti ti-flame" style="font-size:11px;color:var(--text-warning)"></i> '+goalCal.toLocaleString()+' kcal</div><div class="sum-sub"><i class="ti ti-shoe" style="font-size:10px;color:#639922"></i> '+stepGoal.toLocaleString()+' steps</div></div>'+
        '</div>';
      card.appendChild(sec);
    });

    var ar=document.createElement('div');ar.style.cssText='padding:7px 1.25rem;border-top:0.5px solid var(--border-t)';
    ar.innerHTML='<button class="add-btn" data-pi="'+pi+'" data-action="addweek"><i class="ti ti-plus"></i>Add week</button>';
    card.appendChild(ar);app.appendChild(card);
  });

  var apw=document.createElement('div');apw.style.cssText='text-align:center;padding:.25rem 0 1rem';
  apw.innerHTML='<button class="add-btn" id="add-period"><i class="ti ti-plus"></i>Add 4-week period</button>';
  app.appendChild(apw);

  document.getElementById('toggle-dash').addEventListener('click',function(){data.showDash=!data.showDash;render()});
  document.getElementById('toggle-guide').addEventListener('click',function(){data.showGuide=!data.showGuide;render()});
  document.getElementById('toggle-train').addEventListener('click',function(){data.showTrain=!data.showTrain;render()});
  document.getElementById('toggle-settings').addEventListener('click',function(){data.showSettings=!data.showSettings;render()});
  document.getElementById('signout-btn').addEventListener('click',function(){if(window._signOut)window._signOut()});
  var ss=document.getElementById('save-settings');
  if(ss)ss.addEventListener('click',function(){

  app.querySelectorAll('.week-header').forEach(function(h){
    h.addEventListener('click',function(){var pi=parseInt(h.dataset.pi),wi=parseInt(h.dataset.wi);data.periods[pi].weeks[wi].collapsed=!data.periods[pi].weeks[wi].collapsed;render()});

  app.querySelectorAll('.day-inp').forEach(function(inp){
    inp.addEventListener('change',function(e){var d=e.target.dataset;data.periods[parseInt(d.pi)].weeks[parseInt(d.wi)].days[parseInt(d.di)][d.field]=e.target.value;scheduleSave();render()});

  app.querySelectorAll('.clr-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){e.stopPropagation();var d=btn.dataset,day=data.periods[parseInt(d.pi)].weeks[parseInt(d.wi)].days[parseInt(d.di)];day.weight='';day.calories='';day.steps='';scheduleSave();render()});

  app.querySelectorAll('[data-field="goal"]').forEach(function(sel){

    inp.addEventListener('change',function(e){var v=parseInt(e.target.value);if(!isNaN(v)&&v>0){data.periods[parseInt(e.target.dataset.pi)].calGoal=v;scheduleSave();render()}});
  });
  app.querySelectorAll('[data-field="stepGoal"]').forEach(function(inp){
    inp.addEventListener('change',function(e){var v=parseInt(e.target.value);if(!isNaN(v)&&v>0){data.periods[parseInt(e.target.dataset.pi)].stepGoal=v;scheduleSave();render()}});

  app.querySelectorAll('[data-action="addweek"]').forEach(function(btn){
    btn.addEventListener('click',function(){data.periods[parseInt(btn.dataset.pi)].weeks.push(makeWeek());scheduleSave();render()});
  });
  var ap=document.getElementById('add-period');
  if(ap)ap.addEventListener('click',function(){data.periods.push(makePeriod());scheduleSave();render()});
}

/* ═══════════════════════════════════════════════════════════
   TRAINING MODULE
   ═══════════════════════════════════════════════════════════ */

// State for training UI (in-memory, not persisted)
var _trTab='library';   // 'library' | 'routines' | 'sessions'
var _trRoutineOpen={};  // {routineId: bool} expanded state
var _wgerCache={};      // search cache

function trData(){
  var d=window._appData;
  if(!d.training)d.training={exercises:[],routines:[],sessions:[]};
  if(!d.training.exercises)d.training.exercises=[];
  if(!d.training.routines)d.training.routines=[];
  if(!d.training.sessions)d.training.sessions=[];
  return d.training;
}

function renderTraining(app){
  var panel=document.createElement('div');panel.className='panel';panel.id='training-panel';

  var headerHtml='<div style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:1rem;display:flex;align-items:center;gap:8px"><i class="ti ti-barbell" style="font-size:17px;color:var(--text-secondary)"></i>Training</div>';

  var tabsHtml='<div class="training-tabs">'+
    '<button class="training-tab'+(_trTab==='library'?' active':'')+'" data-tr-tab="library"><i class="ti ti-search"></i>Exercise Library</button>'+
    '<button class="training-tab'+(_trTab==='routines'?' active':'')+'" data-tr-tab="routines"><i class="ti ti-list-check"></i>Routine Builder</button>'+
    '<button class="training-tab'+(_trTab==='sessions'?' active':'')+'" data-tr-tab="sessions"><i class="ti ti-calendar-event"></i>Session Log</button>'+
    '</div>';

  panel.innerHTML=headerHtml+tabsHtml+'<div id="tr-content"></div>';
  app.appendChild(panel);

  panel.querySelectorAll('[data-tr-tab]').forEach(function(btn){
    btn.addEventListener('click',function(){_trTab=btn.dataset.trTab;renderTrainingContent();});
  });

  renderTrainingContent();
}

function renderTrainingContent(){
  var cont=document.getElementById('tr-content');
  if(!cont)return;
  if(_trTab==='library')renderLibrary(cont);
  else if(_trTab==='routines')renderRoutines(cont);
  else renderSessions(cont);
}

// ── EXERCISE LIBRARY ──
function renderLibrary(cont){
  var td=trData();
  var html='<div class="tr-section-title">Search WGER exercise database</div>'+
    '<div class="tr-search-row">'+
    '<input class="tr-search-inp" id="tr-ex-search" type="text" placeholder="e.g. bench press, squat…">'+
    '<button class="tr-btn" id="tr-ex-go"><i class="ti ti-search"></i>Search</button>'+
    '</div>'+
    '<div id="tr-search-results"></div>'+
    '<div class="tr-divider"></div>'+
    '<div class="tr-section-title">Custom exercises <span style="font-size:10px;color:var(--text-tertiary);text-transform:none;letter-spacing:0">(saved to your account)</span></div>'+
    '<div id="tr-custom-list"></div>'+
    '<button class="tr-btn tr-btn-sm" id="tr-add-custom" style="margin-top:4px"><i class="ti ti-plus"></i>Add custom exercise</button>';
  cont.innerHTML=html;

  // Render custom exercises
  renderCustomExercises();

  document.getElementById('tr-ex-go').addEventListener('click',doWgerSearch);
  document.getElementById('tr-ex-search').addEventListener('keydown',function(e){if(e.key==='Enter')doWgerSearch();});
  document.getElementById('tr-add-custom').addEventListener('click',showAddCustomModal);
}

function renderCustomExercises(){
  var td=trData();
  var list=document.getElementById('tr-custom-list');
  if(!list)return;
  var customs=td.exercises.filter(function(e){return e.custom;});
  if(!customs.length){list.innerHTML='<div class="tr-empty" style="padding:.75rem 0">No custom exercises yet.</div>';return;}
  list.innerHTML=customs.map(function(ex){
    return '<div class="exercise-item">'+
      '<div class="exercise-item-info">'+
        '<div class="exercise-item-name">'+esc(ex.name)+'</div>'+
        '<div class="exercise-item-meta">'+esc(ex.muscle||'—')+' &bull; '+esc(ex.equipment||'—')+'</div>'+
      '</div>'+
      '<span class="exercise-badge custom">Custom</span>'+
      '<button class="tr-btn tr-btn-sm tr-btn-danger" data-del-ex="'+ex.id+'"><i class="ti ti-trash" style="font-size:11px"></i></button>'+
    '</div>';
  }).join('');
  list.querySelectorAll('[data-del-ex]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=btn.dataset.delEx;
      var td=trData();
      td.exercises=td.exercises.filter(function(e){return e.id!==id;});
      // Remove from routines too
      td.routines.forEach(function(r){r.exercises=r.exercises.filter(function(re){return re.exId!==id;});});
      scheduleSave();renderCustomExercises();
    });
  });
}

function doWgerSearch(){
  var q=(document.getElementById('tr-ex-search')||{}).value;
  if(!q||!q.trim())return;
  var res=document.getElementById('tr-search-results');
  if(!res)return;
  res.innerHTML='<div class="loading-inline"><div class="spinner-sm"></div>Searching…</div>';

  var cacheKey=q.trim().toLowerCase();
  if(_wgerCache[cacheKey]){renderWgerResults(_wgerCache[cacheKey]);return;}

  // Use exercisetranslation endpoint: supports name__icontains, language=2 (English), status=2 (approved)
  var url='https://wger.de/api/v2/exercisetranslation/?format=json&language=2&name__icontains='+encodeURIComponent(q.trim())+'&limit=30';
  fetch(url).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    var results=data.results||[];
    // De-duplicate by exercise base id (each exercise can have multiple translations)
    var seen={};
    var items=[];
    results.forEach(function(t){
      var baseId=t.exercise;
      if(seen[baseId])return;
      seen[baseId]=true;
      items.push({
        id:'wger_'+baseId,
        name:t.name||'Unknown',
        muscle:'—',      // translation endpoint doesn't include muscle; shown as — until info loaded
        equipment:'—',
        custom:false,
        wgerId:baseId
      });
    });
    _wgerCache[cacheKey]=items;
    renderWgerResults(items);
  }).catch(function(err){
    console.error('WGER search error:',err);
    if(document.getElementById('tr-search-results'))
      document.getElementById('tr-search-results').innerHTML='<div class="tr-empty" style="color:var(--text-danger)">Search failed. Check your connection and try again.</div>';
  });
}

function renderWgerResults(items){
  var res=document.getElementById('tr-search-results');
  if(!res)return;
  if(!items||!items.length){res.innerHTML='<div class="tr-empty">No results found.</div>';return;}
  var td=trData();
  var alreadySaved={};
  td.exercises.forEach(function(e){if(e.wgerId)alreadySaved[e.wgerId]=true;});

  res.innerHTML='<div class="exercise-list">'+items.slice(0,20).map(function(ex){
    var saved=alreadySaved[ex.wgerId];
    return '<div class="exercise-item">'+
      '<div class="exercise-item-info">'+
        '<div class="exercise-item-name">'+esc(ex.name)+'</div>'+
        '<div class="exercise-item-meta">'+esc(ex.muscle)+' &bull; '+esc(ex.equipment)+'</div>'+
      '</div>'+
      (saved
        ? '<span class="exercise-badge">Saved</span>'
        : '<button class="tr-btn tr-btn-sm" data-save-ex="'+encodeURIComponent(JSON.stringify(ex))+'"><i class="ti ti-plus" style="font-size:11px"></i>Save</button>'
      )+
    '</div>';
  }).join('')+'</div>';

  res.querySelectorAll('[data-save-ex]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var ex=JSON.parse(decodeURIComponent(btn.dataset.saveEx));
      ex.id='ex_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
      trData().exercises.push(ex);
      scheduleSave();
      // Refresh result list
      var cacheKey=(document.getElementById('tr-ex-search')||{}).value||'';
      renderWgerResults(_wgerCache[cacheKey.trim().toLowerCase()]||[]);
      renderCustomExercises();
    });
  });
}

function showAddCustomModal(){
  var overlay=document.createElement('div');overlay.className='tr-modal-overlay';
  overlay.innerHTML='<div class="tr-modal">'+
    '<div class="tr-modal-title"><i class="ti ti-dumbbell"></i>Add custom exercise</div>'+
    '<div class="tr-field"><label class="tr-label">Exercise name *</label><input class="tr-inp" id="cm-name" placeholder="e.g. Cable fly"></div>'+
    '<div class="tr-field"><label class="tr-label">Muscle group</label><input class="tr-inp" id="cm-muscle" placeholder="e.g. Chest"></div>'+
    '<div class="tr-field"><label class="tr-label">Equipment</label><input class="tr-inp" id="cm-equip" placeholder="e.g. Cable machine"></div>'+
    '<div class="tr-modal-actions">'+
    '<button class="tr-btn" id="cm-cancel">Cancel</button>'+
    '<button class="tr-btn tr-btn-primary" id="cm-save">Save</button>'+
    '</div></div>';
  document.body.appendChild(overlay);
  overlay.querySelector('#cm-cancel').addEventListener('click',function(){document.body.removeChild(overlay);});

    var name=(overlay.querySelector('#cm-name').value||'').trim();

    var ex={id:'ex_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),name:name,muscle:(overlay.querySelector('#cm-muscle').value||'').trim()||'—',equipment:(overlay.querySelector('#cm-equip').value||'').trim()||'—',custom:true};
    trData().exercises.push(ex);scheduleSave();document.body.removeChild(overlay);renderCustomExercises();

function renderRoutines(cont){

function renderRoutineList(){
  var td=trData();
  var listEl=document.getElementById('tr-routine-list');
  if(!listEl)return;
  if(!td.routines.length){listEl.innerHTML='<div class="tr-empty">No routines yet. Create one to get started.</div>';return;}
  listEl.innerHTML='';
  td.routines.forEach(function(routine,ri){
    var open=_trRoutineOpen[routine.id];
    var card=document.createElement('div');card.className='routine-card';
    var hdrHtml='<div class="routine-header" data-rcard="'+routine.id+'" style="background:var(--bg-tertiary)">'+
      '<div class="routine-title"><i class="ti ti-list-check" style="font-size:14px;color:var(--text-secondary)"></i>'+esc(routine.name)+'<span style="font-size:11px;color:var(--text-tertiary);font-weight:400">('+routine.exercises.length+' exercises)</span></div>'+
      '<div style="display:flex;gap:6px">'+
      '<button class="tr-btn tr-btn-sm" data-add-ex-to="'+ri+'"><i class="ti ti-plus" style="font-size:11px"></i>Add exercise</button>'+
      '<button class="tr-btn tr-btn-sm tr-btn-danger" data-del-routine="'+ri+'"><i class="ti ti-trash" style="font-size:11px"></i></button>'+
      '<i class="ti ti-chevron-'+(open?'up':'down')+' chevron" style="font-size:13px;color:var(--text-tertiary);margin-left:4px;align-self:center"></i>'+
      '</div></div>';

    var bodyHtml='';
    if(open){
      var hdrs='<div class="routine-ex-row" style="margin-bottom:4px">'+
        '<div class="routine-col-hdr">Exercise</div>'+
        '<div class="routine-col-hdr">Sets</div>'+
        '<div class="routine-col-hdr">Reps</div>'+
        '<div class="routine-col-hdr">Weight</div>'+
        '<div></div></div>';
      var rows=routine.exercises.map(function(re,rei){
        return '<div class="routine-ex-row" data-rei="'+rei+'" data-ri="'+ri+'">'+
          '<div class="routine-ex-name" title="'+esc(re.name)+'">'+esc(re.name)+'</div>'+
          '<input class="routine-ex-inp" type="number" min="1" max="99" placeholder="3" value="'+esc(re.sets||'')+'" data-ri="'+ri+'" data-rei="'+rei+'" data-f="sets">'+
          '<input class="routine-ex-inp" type="number" min="1" max="999" placeholder="10" value="'+esc(re.reps||'')+'" data-ri="'+ri+'" data-rei="'+rei+'" data-f="reps">'+
          '<input class="routine-ex-inp" type="number" min="0" max="9999" step="0.5" placeholder="kg" value="'+esc(re.weight||'')+'" data-ri="'+ri+'" data-rei="'+rei+'" data-f="weight">'+
          '<button class="tr-btn tr-btn-sm tr-btn-danger" style="padding:0;width:28px;height:26px;justify-content:center" data-del-re="'+rei+'" data-ri="'+ri+'"><i class="ti ti-x" style="font-size:10px"></i></button>'+
          '</div>';
      }).join('');
      bodyHtml='<div class="routine-body">'+hdrs+rows+
        (routine.exercises.length===0?'<div class="tr-empty" style="padding:.5rem 0">No exercises yet.</div>':'')+
        '</div>';
    }
    card.innerHTML=hdrHtml+bodyHtml;
    listEl.appendChild(card);

    card.querySelector('[data-rcard]').addEventListener('click',function(e){
      if(e.target.closest('button')||e.target.closest('input'))return;
      _trRoutineOpen[routine.id]=!_trRoutineOpen[routine.id];renderRoutineList();
    });
    card.querySelector('[data-add-ex-to]').addEventListener('click',function(){showAddExToRoutine(ri);});
    card.querySelector('[data-del-routine]').addEventListener('click',function(){
      if(!confirm('Delete "'+routine.name+'"?'))return;
      trData().routines.splice(ri,1);scheduleSave();renderRoutineList();
    });
    if(open){
      card.querySelectorAll('[data-del-re]').forEach(function(btn){
        btn.addEventListener('click',function(){
          var ri2=parseInt(btn.dataset.ri),rei=parseInt(btn.dataset.delRe);
          trData().routines[ri2].exercises.splice(rei,1);scheduleSave();renderRoutineList();
        });
      });
      card.querySelectorAll('.routine-ex-inp').forEach(function(inp){
        inp.addEventListener('change',function(){
          var ri2=parseInt(inp.dataset.ri),rei=parseInt(inp.dataset.rei),f=inp.dataset.f;
          trData().routines[ri2].exercises[rei][f]=inp.value;scheduleSave();
        });
      });
    }
  });
}

function showAddRoutineModal(){
  var overlay=document.createElement('div');overlay.className='tr-modal-overlay';
  overlay.innerHTML='<div class="tr-modal">'+
    '<div class="tr-modal-title"><i class="ti ti-list-check"></i>New routine</div>'+
    '<div class="tr-field"><label class="tr-label">Routine name *</label><input class="tr-inp" id="rn-name" placeholder="e.g. Push Day"></div>'+
    '<div class="tr-modal-actions">'+
    '<button class="tr-btn" id="rn-cancel">Cancel</button>'+
    '<button class="tr-btn tr-btn-primary" id="rn-save">Create</button>'+
    '</div></div>';
  document.body.appendChild(overlay);
  overlay.querySelector('#rn-cancel').addEventListener('click',function(){document.body.removeChild(overlay);});
  overlay.querySelector('#rn-save').addEventListener('click',function(){
    var name=(overlay.querySelector('#rn-name').value||'').trim();if(!name)return;
    var r={id:'r_'+Date.now(),name:name,exercises:[]};
    trData().routines.push(r);_trRoutineOpen[r.id]=true;scheduleSave();document.body.removeChild(overlay);renderRoutineList();
  });
}

function showAddExToRoutine(ri){
  var td=trData();
  var all=td.exercises;
  if(!all.length){alert('No exercises saved yet. Search and save exercises in the Exercise Library first.');return;}
  var overlay=document.createElement('div');overlay.className='tr-modal-overlay';
  var opts=all.map(function(ex){return '<option value="'+ex.id+'">'+esc(ex.name)+(ex.custom?' (custom)':'')+'</option>';}).join('');
  overlay.innerHTML='<div class="tr-modal">'+
    '<div class="tr-modal-title"><i class="ti ti-plus"></i>Add exercise to routine</div>'+
    '<div class="tr-field"><label class="tr-label">Exercise</label><select class="tr-inp" id="ae-ex">'+opts+'</select></div>'+
    '<div class="tr-field" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
    '<div><label class="tr-label">Sets</label><input class="tr-inp" id="ae-sets" type="number" min="1" max="99" placeholder="3"></div>'+
    '<div><label class="tr-label">Reps</label><input class="tr-inp" id="ae-reps" type="number" min="1" max="999" placeholder="10"></div>'+
    '<div><label class="tr-label">Weight (kg)</label><input class="tr-inp" id="ae-weight" type="number" min="0" step="0.5" placeholder="0"></div>'+
    '</div>'+
    '<div class="tr-modal-actions">'+
    '<button class="tr-btn" id="ae-cancel">Cancel</button>'+
    '<button class="tr-btn tr-btn-primary" id="ae-save">Add</button>'+
    '</div></div>';
  document.body.appendChild(overlay);
  overlay.querySelector('#ae-cancel').addEventListener('click',function(){document.body.removeChild(overlay);});
  overlay.querySelector('#ae-save').addEventListener('click',function(){
    var exId=overlay.querySelector('#ae-ex').value;
    var ex=td.exercises.find(function(e){return e.id===exId;});
    if(!ex)return;
    var re={exId:exId,name:ex.name,sets:overlay.querySelector('#ae-sets').value,reps:overlay.querySelector('#ae-reps').value,weight:overlay.querySelector('#ae-weight').value};
    trData().routines[ri].exercises.push(re);scheduleSave();document.body.removeChild(overlay);renderRoutineList();
  });
}

// ── SESSION LOG ──
function renderSessions(cont){
  var td=trData();
  var html='<div class="tr-section-title">Log a workout</div>';

  if(!td.routines.length){
    html+='<div class="tr-empty">Build a routine first in the Routine Builder tab, then log sessions here.</div>';
    cont.innerHTML=html;return;
  }

  // Routine selector
  var routineOpts=td.routines.map(function(r,i){return '<option value="'+i+'">'+esc(r.name)+'</option>';}).join('');
  html+='<select class="tr-select" id="sl-routine">'+routineOpts+'</select>';
  html+='<div id="sl-ex-form" class="session-log-form"></div>';
  html+='<div class="tr-field"><label class="tr-label">Note (optional)</label><textarea class="tr-textarea" id="sl-note" placeholder="How did it go?"></textarea></div>';
  html+='<button class="tr-btn tr-btn-primary" id="sl-log" style="margin-bottom:16px"><i class="ti ti-check"></i>Log session</button>';
  html+='<div class="tr-divider"></div>'+
    '<div class="tr-section-title">Session history</div>'+
    '<div id="tr-session-list" class="session-list"></div>';

  cont.innerHTML=html;

  // Build exercise form for selected routine
  function buildExForm(){
    var ri=parseInt(document.getElementById('sl-routine').value)||0;
    var routine=td.routines[ri];
    var form=document.getElementById('sl-ex-form');
    if(!routine||!routine.exercises.length){form.innerHTML='<div class="tr-empty" style="padding:.5rem 0">This routine has no exercises.</div>';return;}
    var hdrs='<div class="session-log-ex" style="margin-bottom:3px">'+
      '<div style="font-size:10px;color:var(--text-tertiary)">Exercise</div>'+
      '<div style="font-size:10px;color:var(--text-tertiary);text-align:center">Sets</div>'+
      '<div style="font-size:10px;color:var(--text-tertiary);text-align:center">Reps</div>'+
      '<div style="font-size:10px;color:var(--text-tertiary);text-align:center">Weight</div>'+
      '</div>';
    var rows=routine.exercises.map(function(re,rei){
      return '<div class="session-log-ex">'+
        '<div style="font-size:12px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(re.name)+'</div>'+
        '<input class="routine-ex-inp" type="number" min="1" max="99" placeholder="'+esc(re.sets||'3')+'" data-sl-rei="'+rei+'" data-sl-f="sets" style="text-align:center">'+
        '<input class="routine-ex-inp" type="number" min="1" max="999" placeholder="'+esc(re.reps||'10')+'" data-sl-rei="'+rei+'" data-sl-f="reps" style="text-align:center">'+
        '<input class="routine-ex-inp" type="number" min="0" max="9999" step="0.5" placeholder="'+esc(re.weight||'0')+'" data-sl-rei="'+rei+'" data-sl-f="weight" style="text-align:center">'+
        '</div>';
    }).join('');
    form.innerHTML=hdrs+rows;
  }
  buildExForm();
  document.getElementById('sl-routine').addEventListener('change',buildExForm);

  // Log session
  document.getElementById('sl-log').addEventListener('click',function(){
    var ri=parseInt(document.getElementById('sl-routine').value)||0;
    var routine=td.routines[ri];
    if(!routine)return;
    var exercises=routine.exercises.map(function(re,rei){
      var sets=document.querySelector('[data-sl-rei="'+rei+'"][data-sl-f="sets"]');
      var reps=document.querySelector('[data-sl-rei="'+rei+'"][data-sl-f="reps"]');
      var weight=document.querySelector('[data-sl-rei="'+rei+'"][data-sl-f="weight"]');
      return {exId:re.exId,name:re.name,sets:(sets&&sets.value)||re.sets||'',reps:(reps&&reps.value)||re.reps||'',weight:(weight&&weight.value)||re.weight||''};
    });
    var note=(document.getElementById('sl-note').value||'').trim();
    var session={id:'s_'+Date.now(),routineId:routine.id,routineName:routine.name,date:new Date().toISOString(),exercises:exercises,note:note};
    td.sessions.unshift(session);scheduleSave();
    // Reset form
    document.getElementById('sl-note').value='';
    buildExForm();
    renderSessionList();
  });

  renderSessionList();
}

function renderSessionList(){
  var td=trData();
  var listEl=document.getElementById('tr-session-list');
  if(!listEl)return;
  if(!td.sessions.length){listEl.innerHTML='<div class="tr-empty">No sessions logged yet.</div>';return;}

  // Group by routine for progression view; show flat list with progression hints
  listEl.innerHTML=td.sessions.slice(0,30).map(function(s){
    var dateStr=new Date(s.date).toLocaleDateString('en-SE',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    var exRows=s.exercises.map(function(e){
      // Find previous best for this exercise
      var prev=null;
      for(var i=1;i<td.sessions.length;i++){
        var ps=td.sessions[i];
        var pe=ps.exercises&&ps.exercises.find(function(pe){return pe.exId===e.exId;});
        if(pe&&pe.weight&&parseFloat(pe.weight)>0){prev=pe;break;}
      }
      var trend='';
      if(prev&&e.weight&&parseFloat(e.weight)>parseFloat(prev.weight)){trend='<span style="color:var(--text-success);font-size:10px"> ▲ +'+((parseFloat(e.weight)-parseFloat(prev.weight)).toFixed(1))+'kg</span>';}
      else if(prev&&e.weight&&parseFloat(e.weight)<parseFloat(prev.weight)){trend='<span style="color:var(--text-danger);font-size:10px"> ▼</span>';}
      return '<div class="session-ex-row"><span style="color:var(--text-primary)">'+esc(e.name)+'</span><span>'+
        (e.sets?e.sets+'×':'')+''+(e.reps?e.reps+' reps':'')+''+(e.weight&&parseFloat(e.weight)>0?' @ '+parseFloat(e.weight)+'kg':'')+trend+'</span></div>';
    }).join('');
    return '<div class="session-card">'+
      '<div class="session-date">'+dateStr+'</div>'+
      '<div class="session-routine-name"><i class="ti ti-barbell" style="font-size:13px;color:var(--text-secondary)"></i>'+esc(s.routineName)+'</div>'+
      '<div class="session-ex-rows">'+exRows+'</div>'+
      (s.note?'<div class="session-note">'+esc(s.note)+'</div>':'')+
      '</div>';
  }).join('');
}

function esc(str){
  if(str===undefined||str===null)return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
